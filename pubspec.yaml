name: gitnote
description: GitHub Markdown notes sync and reader app built with Flutter.
publish_to: "none"
version: 1.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_markdown: ^0.7.4+1
  flutter_riverpod: ^2.6.1
  markdown: ^7.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  shared_preferences: ^2.3.2
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
