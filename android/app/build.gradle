plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.gitnote"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.example.gitnote"
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            ndk {
                abiFilters "arm64-v8a"
            }
        }
    }
}

android.applicationVariants.all { variant ->
    variant.outputs.all {
        outputFileName = "gitnote-v${variant.versionName}-${variant.buildType.name}.apk"
    }
}

tasks.register("copyVersionedReleaseApk", Copy) {
    dependsOn("assembleRelease")

    from(layout.buildDirectory.dir("outputs/apk/release"))
    include("gitnote-v*-release.apk")
    include("gitnote-v*-release.apk.sha1")
    into(layout.buildDirectory.dir("outputs/flutter-apk"))
}

flutter {
    source = "../.."
}
